[package]
name = "rtc-sctp-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
bytes = "1.11.0"

[dependencies.rtc-sctp]
path = ".."

[dependencies.shared]
path = "../../rtc-shared"
package = "rtc-shared"
default-features = false

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "packet_unmarshal"
path = "fuzz_targets/packet_unmarshal.rs"
test = false
doc = false
